name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-structure:
    name: Validate structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          for f in skills/michael-polanyi/SKILL.md skills/michael-polanyi/examples.md skills/michael-polanyi/polanyi-notes.md; do
            test -f "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Validate frontmatter
        run: |
          if grep -q "^---" skills/michael-polanyi/SKILL.md && grep -q "^name:" skills/michael-polanyi/SKILL.md; then
            echo "OK: frontmatter valid"
          else
            echo "FAIL: invalid frontmatter"
            exit 1
          fi

  lint-markdown:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check frontmatter closure
        run: |
          errors=0
          for f in $(find skills/michael-polanyi -name "*.md" -type f); do
            if head -1 "$f" | grep -q "^---"; then
              count=$(head -n 20 "$f" | tail -n +2 | grep -c "^---")
              if [ "$count" -eq 0 ]; then
                echo "FAIL: unclosed frontmatter in $f"
                errors=$((errors + 1))
              fi
            fi
          done
          test $errors -eq 0 && echo "OK: all markdown valid" || exit 1

  validate-evals:
    name: Validate evals
    runs-on: ubuntu-latest
    needs: validate-structure
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check eval files
        run: |
          for f in skills/michael-polanyi/evals/evals.json skills/michael-polanyi/evals/prompts.md skills/michael-polanyi/evals/rubric.md; do
            test -f "$f" && echo "OK: $f" || echo "WARN: $f missing"
          done

      - name: Validate evals.json
        run: |
          python3 -c "
import json, sys
with open('skills/michael-polanyi/evals/evals.json') as f:
    d = json.load(f)
evals = d.get('evals', [])
print(f'OK: {len(evals)} evals found')
for i, e in enumerate(evals):
    for k in ['id', 'eval_name', 'prompt', 'assertions']:
        if k not in e:
            print(f'FAIL: eval {i} missing {k}')
            sys.exit(1)
print('OK: all evals have required fields')
"

  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install flake8 black

      - name: Check Python syntax
        run: |
          for f in skills/michael-polanyi/scripts/*.py skills/michael-polanyi/eval-viewer/*.py 2>/dev/null; do
            python3 -m py_compile "$f" && echo "OK: $f" || echo "FAIL: $f"
          done

      - name: Run flake8
        run: |
          if [ -d "skills/michael-polanyi/scripts" ]; then
            flake8 skills/michael-polanyi/scripts/ --max-line-length=120 --ignore=E501,W503 || echo "WARN: flake8 issues (non-fatal)"
          fi

  content-quality:
    name: Content quality
    runs-on: ubuntu-latest
    needs: validate-structure
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check SKILL.md length
        run: |
          lines=$(wc -l < skills/michael-polanyi/SKILL.md)
          echo "SKILL.md: $lines lines"
          test $lines -le 200 && echo "OK: length reasonable" || echo "WARN: consider simplifying"

      - name: Check examples balance
        run: |
          before=$(grep -c "## Before" skills/michael-polanyi/examples.md || echo 0)
          after=$(grep -c "## After" skills/michael-polanyi/examples.md || echo 0)
          echo "Before: $before, After: $after"
          test "$before" -eq "$after" && echo "OK: balanced" || echo "WARN: unbalanced pairs"

      - name: Run fluff detection
        run: |
          if [ -f "skills/michael-polanyi/scripts/detect_fluff.py" ]; then
            python3 skills/michael-polanyi/scripts/detect_fluff.py skills/michael-polanyi/examples.md || echo "INFO: fluff detected (expected in examples)"
          fi
          echo "OK: content check complete"

  generate-report:
    name: Generate report
    runs-on: ubuntu-latest
    needs: validate-evals
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate HTML review
        run: |
          cd skills/michael-polanyi/eval-viewer
          if [ -f "generate_review.py" ] && [ -f "../evals/evals.json" ]; then
            python3 generate_review.py && echo "OK: review.html generated" || echo "WARN: generation failed"
          else
            echo "WARN: skipped (missing files)"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-review
          path: skills/michael-polanyi/eval-viewer/review.html
          if-no-files-found: ignore
