name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md
        run: test -f skills/michael-polanyi/SKILL.md && echo "OK: SKILL.md" || (echo "FAIL: SKILL.md" && exit 1)

      - name: Check examples.md
        run: test -f skills/michael-polanyi/examples.md && echo "OK: examples.md" || (echo "FAIL: examples.md" && exit 1)

      - name: Check evals.json
        run: test -f skills/michael-polanyi/evals/evals.json && echo "OK: evals.json" || (echo "FAIL: evals.json" && exit 1)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate evals.json
        run: |
          python3 -c "
import json
with open('skills/michael-polanyi/evals/evals.json') as f:
    data = json.load(f)
evals = data.get('evals', [])
print(f'OK: {len(evals)} evals found')
"
