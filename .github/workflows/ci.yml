name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md exists
        run: |
          if [ -f "skills/michael-polanyi/SKILL.md" ]; then
            echo "✓ SKILL.md found"
          else
            echo "✗ SKILL.md missing"
            exit 1
          fi

      - name: Validate frontmatter
        run: |
          if grep -q "^---" skills/michael-polanyi/SKILL.md && grep -q "^name:" skills/michael-polanyi/SKILL.md; then
            echo "✓ Frontmatter valid"
          else
            echo "✗ Frontmatter invalid"
            exit 1
          fi

      - name: Check required files
        run: |
          required_files=("skills/michael-polanyi/SKILL.md" "skills/michael-polanyi/polanyi-notes.md" "skills/michael-polanyi/examples.md")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file missing"
              exit 1
            fi
          done

  markdown-lint:
    name: Lint markdown files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown syntax
        run: |
          # Basic markdown validation
          find . -name "*.md" -type f | while read -r file; do
            # Check for unclosed frontmatter
            if head -1 "$file" | grep -q "^---"; then
              # Get first 20 lines, skip the first line, check for closing ---
              second_dash=$(head -n 20 "$file" | tail -n +2 | grep -c "^---")
              if [ "$second_dash" -eq 0 ]; then
                echo "✗ $file has unclosed frontmatter"
                exit 1
              fi
            fi
            echo "✓ $file syntax OK"
          done

  eval-smoke-test:
    name: Smoke test eval prompts
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Verify eval files exist
        run: |
          eval_files=("evals/prompts.md" "evals/rubric.md" "evals/protocol.md")
          for file in "${eval_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "⚠ $file missing (optional)"
            fi
          done
